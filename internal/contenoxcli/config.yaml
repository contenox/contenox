# Contenox config. Edit this file to connect to your LLM provider.
# Run 'contenox init' to create this file, then 'contenox --help' for usage.
# All fields are optional; CLI flags override config values.
default_chain: default-chain.json

# ──────────────────────────────────────────────────────
# OPTION A: Local model via Ollama (default)
# Prerequisites: ollama serve && ollama pull qwen2.5:7b
# ──────────────────────────────────────────────────────
backends:
  - name: local
    type: ollama
    base_url: http://127.0.0.1:11434
default_provider: local
default_model: qwen2.5:7b
context: 32768

# ──────────────────────────────────────────────────────
# OPTION B: OpenAI
# Prerequisites: export OPENAI_API_KEY=sk-...
# If OPENAI_API_KEY is set, the backend is auto-declared — no config edit needed.
# To override the default model or name, uncomment:
# ──────────────────────────────────────────────────────
# backends:
#   - name: openai
#     type: openai
#     base_url: https://api.openai.com/v1
#     api_key_from_env: OPENAI_API_KEY
# default_provider: openai
# default_model: gpt-4.1-mini

# ──────────────────────────────────────────────────────
# OPTION C: Google Gemini
# Prerequisites: export GEMINI_API_KEY=...
# If GEMINI_API_KEY is set, the backend is auto-declared — no config edit needed.
# To override the default model or name, uncomment:
# ──────────────────────────────────────────────────────
# backends:
#   - name: gemini
#     type: gemini
#     api_key_from_env: GEMINI_API_KEY
# default_provider: gemini
# default_model: gemini-3.1-flash-lite-preview

# NOTE: for 'contenox plan', the model MUST support tool calling.
# Recommended: qwen2.5:7b (Ollama), gpt-4.1-mini (OpenAI), gemini-3.1-flash-lite-preview (Gemini)

# Shell execution hook — enables natural language → shell commands and 'contenox plan next'.
# Set to true to enable. You MUST also configure local_shell_allowed_commands.
# Disabled by default — enable only in trusted environments.
enable_local_shell: false
# local_shell_allowed_commands: "bash,sh,echo,cat,ls,chmod,git,go,python,uv,node,npm,jq,grep,find,sed,awk,curl,wget,tar,unzip,mkdir,cp,mv,touch,head,tail,date,pwd,env"
# Optional deny list (always blocked even if in the allow list):
# local_shell_denied_commands:
#   - rm
#   - dd
#   - mkfs
